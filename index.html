<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css"></head>
<body>
    <div class="card-container">
        <div class="top-bar"></div>
        <div class="greeting">hi! I am Hugh</div>
        <div class="menu">
            <button class="menuButton" id="aboutMe" onclick="openModal('about')">
                <img src="images/me icon.png" alt="about me">
                about me
            </button>

            <button class="menuButton" id="projects" onclick="openModal('projects')">
                <img src="images/folder icon.png" alt="projects">
                projects
            </button>

            <button class="menuButton" id="contact" onclick="openModal('contact')">
                <img src="images/email icon.png" alt="contact">
                contact
            </button>
        </div>
    </div>
   
    <div class="modal" id="modal-about">
        <div class="modal-top-bar" id='top-bar'>
            <button class="dot" id="dot-close" onclick="closeModal('about')"></button>
        </div>
        <div class="modal-body">
            <h2>About Me</h2>
            <p>Your content here</p>
        </div>
    </div>
    

    
    <div class="modal" id="modal-projects">
        <div class="modal-top-bar">
            <button class="dot" id="dot-close" onclick="closeModal('projects')"></button>
        </div>
        <div class="modal-body">
            <h2>Projects</h2>
            <p>Your content here</p>
        </div>
    </div>
   

    
    <div class="modal" id="modal-contact">
        <div class="modal-top-bar">
            <button class="dot" id="dot-close" onclick="closeModal('contact')"></button>
        </div>
        <div class="modal-body">
            <h2>Contact</h2>
            <p>Your content here</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
